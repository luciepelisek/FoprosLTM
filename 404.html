<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stránka nenalezena | 404 | FOPROS LTM</title>
    <meta name="description" content="Požadovaná stránka nebyla nalezena.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#45721D">

    <link rel="icon" href="Obrazky/Favicon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">

    <style>
        .error-page-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, rgba(45, 61, 40, 0.95) 0%, rgba(61, 82, 52, 0.95) 100%), url('Obrazky/Foto1.jpg') center/cover no-repeat;
            padding: 2rem;
            color: var(--white);
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: var(--gradient-primary);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-title {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--white);
        }

        .error-desc {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 3rem;
            max-width: 600px;
        }

        .error-logo {
            margin-bottom: 2rem;
            max-width: 200px;
        }

        .error-logo img {
            width: 100%;
            height: auto;
            filter: brightness(0) invert(1);
        }

        .error-page-wrapper .btn-primary {
            font-size: 1.1rem;
            padding: 1rem 2.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <main class="error-page-wrapper">
        <div class="error-code">404</div>
        <h1 class="error-title">Ups... tudy cesta nevede</h1>

        <a href="index.html" class="btn btn-primary">
            <span>Zpět na hlavní stranu</span>
            <i class="fa-solid fa-arrow-right"></i>
        </a>
    </main>

</body>

</html>
